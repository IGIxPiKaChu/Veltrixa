<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>AI Assistant — Veltrixa</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07071a;--card:#111128;
  --cyan:#00d4ff;--purple:#9b5de5;--pink:#f72585;--green:#4ade80;
  --text:#e2e8f0;--muted:#5a6a82;
  --grad:linear-gradient(135deg,#00d4ff,#9b5de5,#f72585);
  --fD:'Rajdhani',sans-serif;--fB:'Inter',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--fB);overflow:hidden}
#three-bg{position:fixed;inset:0;z-index:0;pointer-events:none}
.shell{position:relative;z-index:1;width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.screen{
  width:100%;max-width:420px;height:100%;max-height:860px;
  background:rgba(9,9,28,0.88);backdrop-filter:blur(20px);
  border:1px solid rgba(155,93,229,0.25);border-radius:36px;
  display:flex;flex-direction:column;overflow:hidden;
  box-shadow:0 0 0 1px rgba(0,212,255,0.08),0 0 60px rgba(155,93,229,0.12),0 0 120px rgba(0,212,255,0.06),inset 0 1px 0 rgba(255,255,255,0.06);
  position:relative;
}
.screen::before{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:40%;height:2px;background:linear-gradient(90deg,transparent,#9b5de5,#00d4ff,#9b5de5,transparent);
  border-radius:0 0 8px 8px;z-index:10;
}
.chat-header{
  display:flex;align-items:center;gap:12px;padding:16px 16px 12px;
  background:rgba(9,9,28,0.7);backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(255,255,255,0.05);flex-shrink:0;
}
.bot-icon-sm{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  background:rgba(0,212,255,0.08);border:1.5px solid rgba(0,212,255,0.4);
  display:flex;align-items:center;justify-content:center;
}
.bot-icon-sm svg{width:18px;height:18px;color:var(--cyan)}
.header-info{flex:1;min-width:0}
.header-info h1{font-size:15.5px;font-weight:600}
.status-row{display:flex;align-items:center;gap:5px;margin-top:1px}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green)}
.status-row span{font-size:11.5px;color:var(--green)}
.header-actions{display:flex;align-items:center;gap:4px}
.icon-btn{
  width:34px;height:34px;border-radius:50%;background:none;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;color:var(--text);
  transition:color .2s,background .2s;
}
.icon-btn:hover{color:var(--cyan);background:rgba(0,212,255,0.06)}

/* CONTENT */
.content{flex:1;overflow-y:auto;overflow-x:hidden;padding:24px 20px 16px;scrollbar-width:none;display:flex;flex-direction:column;align-items:center}
.content::-webkit-scrollbar{display:none}

/* ORB */
.orb-wrap{position:relative;width:120px;height:120px;margin-bottom:22px;flex-shrink:0}
.orb-glow{
  position:absolute;inset:-20px;border-radius:50%;
  background:radial-gradient(circle,rgba(0,212,255,0.25),transparent 70%);
  animation:orbPulse 2.5s ease-in-out infinite;
}
@keyframes orbPulse{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.15);opacity:1}}
.orb-ring{
  position:absolute;inset:0;border-radius:50%;
  border:2px solid transparent;
  background:linear-gradient(var(--bg),var(--bg)) padding-box,var(--grad) border-box;
  animation:spinRing 5s linear infinite;
}
@keyframes spinRing{to{transform:rotate(360deg)}}
.orb-core{
  position:absolute;inset:10px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#1a3a5c,#0a1828 70%);
  display:flex;align-items:center;justify-content:center;
  box-shadow:inset 0 0 24px rgba(0,212,255,0.3),0 0 30px rgba(0,212,255,0.2);
}
.orb-face{display:flex;gap:14px}
.orb-eye{
  width:7px;height:7px;border-radius:50%;background:var(--cyan);
  box-shadow:0 0 8px var(--cyan);animation:blink 4s ease-in-out infinite;
}
@keyframes blink{0%,90%,100%{transform:scaleY(1)}95%{transform:scaleY(.1)}}

/* GREETING BUBBLE */
.greet-bubble{
  background:var(--card);border:1px solid rgba(255,255,255,0.06);
  border-radius:18px;padding:14px 18px;text-align:center;
  font-size:14px;line-height:1.5;margin-bottom:24px;max-width:280px;
}
.greet-bubble strong{color:var(--cyan)}

/* SUGGESTED LIST */
.suggested-wrap{width:100%}
.suggested-label{font-size:11.5px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;font-weight:600;margin-bottom:10px;padding-left:2px}
.suggested-list{display:flex;flex-direction:column;gap:8px}
.suggested-item{
  display:flex;align-items:center;gap:12px;padding:13px 15px;
  background:var(--card);border:1px solid rgba(255,255,255,0.05);border-radius:14px;
  cursor:pointer;transition:border-color .2s,transform .15s;
}
.suggested-item:hover{transform:translateX(2px);border-color:rgba(155,93,229,0.3)}
.sg-icon{width:34px;height:34px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.sg-icon.c1{background:rgba(0,212,255,0.1)}.sg-icon.c1 svg{color:var(--cyan)}
.sg-icon.c2{background:rgba(155,93,229,0.12)}.sg-icon.c2 svg{color:var(--purple)}
.sg-icon.c3{background:rgba(247,37,133,0.1)}.sg-icon.c3 svg{color:var(--pink)}
.sg-icon.c4{background:rgba(74,222,128,0.1)}.sg-icon.c4 svg{color:var(--green)}
.sg-icon svg{width:16px;height:16px}
.sg-text{flex:1;font-size:13.5px;font-weight:500}
.sg-chevron{color:var(--muted);flex-shrink:0}

/* INPUT BAR */
.input-bar{
  display:flex;align-items:center;gap:10px;padding:14px 16px;
  background:rgba(9,9,28,0.85);backdrop-filter:blur(16px);
  border-top:1px solid rgba(255,255,255,0.05);flex-shrink:0;
}
.input-wrap{
  flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
  border-radius:24px;padding:0 6px 0 18px;display:flex;align-items:center;
  transition:border-color .2s;
}
.input-wrap:focus-within{border-color:rgba(0,212,255,0.4)}
.input-wrap input{
  flex:1;background:none;border:none;outline:none;
  padding:12px 0;font-size:14px;color:var(--text);font-family:var(--fB);
}
.input-wrap input::placeholder{color:var(--muted)}
.mic-btn{
  width:34px;height:34px;border-radius:50%;background:none;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;color:var(--muted);flex-shrink:0;
  transition:color .2s;
}
.mic-btn:hover{color:var(--cyan)}
.send-btn{
  width:38px;height:38px;border-radius:50%;background:var(--grad);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;margin:5px 5px 5px 0;
  box-shadow:0 2px 10px rgba(155,93,229,0.4);transition:transform .15s;
}
.send-btn:hover{transform:scale(1.07)}
.send-btn:active{transform:scale(.92)}
.send-btn svg{width:17px;height:17px;color:#fff;margin-left:2px}

#loader{
  position:fixed;inset:0;z-index:200;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .4s;
}
.loader-logo{animation:floatY 2s ease-in-out infinite}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.loader-dots{display:flex;gap:6px}
.loader-dots div{width:7px;height:7px;border-radius:50%;animation:dot 1.2s ease-in-out infinite}
.loader-dots div:nth-child(1){background:var(--cyan);animation-delay:0s}
.loader-dots div:nth-child(2){background:var(--purple);animation-delay:.2s}
.loader-dots div:nth-child(3){background:var(--pink);animation-delay:.4s}
@keyframes dot{0%,100%{transform:translateY(0);opacity:.4}50%{transform:translateY(-6px);opacity:1}}
#toast{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(60px);
  background:rgba(11,11,32,0.95);border:1px solid rgba(155,93,229,0.3);
  border-radius:10px;padding:10px 20px;font-size:13px;color:var(--text);
  white-space:nowrap;z-index:999;transition:transform .3s cubic-bezier(.34,1.4,.64,1),opacity .3s;opacity:0;pointer-events:none;
}
@media(max-height:700px){.screen{border-radius:0}.orb-wrap{width:90px;height:90px;margin-bottom:16px}}
@media(min-height:860px){.screen{border-radius:36px}}
</style>
</head>
<body>

<canvas id="three-bg"></canvas>

<div id="loader">
  <svg class="loader-logo" width="52" height="52" viewBox="0 0 56 56" fill="none">
    <defs><linearGradient id="lg0" x1="0" y1="0" x2="56" y2="56" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#00d4ff"/><stop offset="50%" stop-color="#9b5de5"/><stop offset="100%" stop-color="#f72585"/></linearGradient></defs>
    <polygon points="28,4 52,18 52,38 28,52 4,38 4,18" stroke="url(#lg0)" stroke-width="1.5" fill="none"/>
    <circle cx="28" cy="28" r="5" fill="url(#lg0)"/>
  </svg>
  <div class="loader-dots"><div></div><div></div><div></div></div>
</div>

<div class="shell">
  <div class="screen" id="main-screen" style="opacity:0;transition:opacity .5s">

    <div class="chat-header">
      <div class="bot-icon-sm">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="6" width="20" height="14" rx="3"/><circle cx="8.5" cy="13" r="1.5" fill="currentColor" stroke="none"/><circle cx="15.5" cy="13" r="1.5" fill="currentColor" stroke="none"/><path d="M8 6V4a4 4 0 018 0v2"/></svg>
      </div>
      <div class="header-info">
        <h1>AI Assistant</h1>
        <div class="status-row"><div class="status-dot"></div><span>Online</span></div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" onclick="toast('New conversation started')">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <button class="icon-btn" onclick="toast('More options coming soon')">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.8"/><circle cx="12" cy="12" r="1.8"/><circle cx="12" cy="19" r="1.8"/></svg>
        </button>
      </div>
    </div>

    <div class="content">

      <div class="orb-wrap">
        <div class="orb-glow"></div>
        <div class="orb-ring"></div>
        <div class="orb-core">
          <div class="orb-face">
            <div class="orb-eye"></div>
            <div class="orb-eye"></div>
          </div>
        </div>
      </div>

      <div class="greet-bubble" id="greet-bubble">
        Hi <strong>there</strong>! 👋<br>How can I help you today?
      </div>

      <div class="suggested-wrap">
        <div class="suggested-label">Suggested</div>
        <div class="suggested-list">
          <div class="suggested-item" onclick="useSuggestion('Summarize this conversation')">
            <div class="sg-icon c1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></div>
            <span class="sg-text">Summarize this conversation</span>
            <svg class="sg-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
          </div>
          <div class="suggested-item" onclick="useSuggestion('Give me ideas for a sci-fi story')">
            <div class="sg-icon c2"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="5"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg></div>
            <span class="sg-text">Give me ideas for a sci-fi story</span>
            <svg class="sg-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
          </div>
          <div class="suggested-item" onclick="useSuggestion('Explain quantum physics simply')">
            <div class="sg-icon c3"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
            <span class="sg-text">Explain quantum physics simply</span>
            <svg class="sg-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
          </div>
          <div class="suggested-item" onclick="useSuggestion('Translate message to another language')">
            <div class="sg-icon c4"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg></div>
            <span class="sg-text">Translate message to another language</span>
            <svg class="sg-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
          </div>
        </div>
      </div>

    </div><!-- /content -->

    <div class="input-bar">
      <div class="input-wrap">
        <input id="msg-input" type="text" placeholder="Ask me anything…" autocomplete="off"/>
        <button class="mic-btn" onclick="toast('Voice input coming soon')">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2M12 19v4"/></svg>
        </button>
      </div>
      <button class="send-btn" onclick="sendToChat()">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>

  </div><!-- /screen -->
</div>

<div id="toast"></div>

<!-- THREE.JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
  const canvas=document.getElementById('three-bg');
  const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  const scene=new THREE.Scene();
  const camera=new THREE.PerspectiveCamera(60,1,0.1,1000);
  camera.position.z=28;
  function resize(){const W=window.innerWidth,H=window.innerHeight;renderer.setSize(W,H);camera.aspect=W/H;camera.updateProjectionMatrix();}
  resize();window.addEventListener('resize',resize);
  const sg=new THREE.BufferGeometry();
  const sc=2000,sp=new Float32Array(sc*3),sco=new Float32Array(sc*3);
  const pal=[[0,0.83,1],[0.61,0.36,0.9],[0.97,0.15,0.52],[1,1,1]];
  for(let i=0;i<sc;i++){
    sp[i*3]=(Math.random()-.5)*140;sp[i*3+1]=(Math.random()-.5)*140;sp[i*3+2]=(Math.random()-.5)*100;
    const c=pal[Math.floor(Math.random()*pal.length)];sco[i*3]=c[0];sco[i*3+1]=c[1];sco[i*3+2]=c[2];
  }
  sg.setAttribute('position',new THREE.BufferAttribute(sp,3));
  sg.setAttribute('color',new THREE.BufferAttribute(sco,3));
  scene.add(new THREE.Points(sg,new THREE.PointsMaterial({size:.15,vertexColors:true,transparent:true,opacity:.9})));
  function ring(r,c,op,rx,ry){const m=new THREE.Mesh(new THREE.TorusGeometry(r,.05,8,120),new THREE.MeshBasicMaterial({color:c,transparent:true,opacity:op}));m.rotation.x=rx;m.rotation.y=ry;scene.add(m);return m;}
  const r1=ring(16,0x00d4ff,.1,Math.PI/4,0);
  const r2=ring(12,0x9b5de5,.08,-Math.PI/3,Math.PI/5);
  const r3=ring(20,0xf72585,.05,Math.PI/6,Math.PI/3);
  const nodes=[];const nc=[0x00d4ff,0x9b5de5,0xf72585];
  for(let i=0;i<28;i++){
    const m=new THREE.Mesh(new THREE.SphereGeometry(Math.random()*.1+.04,8,8),new THREE.MeshBasicMaterial({color:nc[i%3],transparent:true,opacity:Math.random()*.5+.2}));
    const r=Math.random()*18+4,t=Math.random()*Math.PI*2,p=Math.random()*Math.PI;
    m.position.set(r*Math.sin(p)*Math.cos(t),r*Math.sin(p)*Math.sin(t),r*Math.cos(p));
    m.userData={ox:m.position.x,oy:m.position.y,oz:m.position.z,sp:Math.random()*.5+.2,amp:Math.random()*1.8+.5,ph:Math.random()*Math.PI*2};
    scene.add(m);nodes.push(m);
  }
  function neb(x,y,z,c,op,s){const m=new THREE.Mesh(new THREE.PlaneGeometry(s,s),new THREE.MeshBasicMaterial({color:c,transparent:true,opacity:op,side:THREE.DoubleSide,depthWrite:false}));m.position.set(x,y,z);m.rotation.z=Math.random()*Math.PI;scene.add(m);}
  neb(-12,5,-18,0x00d4ff,0.03,20);neb(12,-5,-22,0x9b5de5,0.04,24);neb(0,0,-25,0xf72585,0.02,30);
  let mx=0,my=0;
  window.addEventListener('mousemove',e=>{mx=(e.clientX/window.innerWidth-.5)*2;my=(e.clientY/window.innerHeight-.5)*2;});
  window.addEventListener('touchmove',e=>{mx=(e.touches[0].clientX/window.innerWidth-.5)*2;my=(e.touches[0].clientY/window.innerHeight-.5)*2;},{passive:true});
  let t=0;
  function animate(){
    requestAnimationFrame(animate);t+=0.007;
    r1.rotation.z+=.002;r2.rotation.z-=.0015;r3.rotation.y+=.001;
    nodes.forEach(n=>{const d=n.userData;n.position.x=d.ox+Math.sin(t*d.sp+d.ph)*d.amp;n.position.y=d.oy+Math.cos(t*d.sp*.7+d.ph)*d.amp;n.material.opacity=.15+Math.abs(Math.sin(t*d.sp+d.ph))*.45;});
    camera.position.x+=(mx*1.8-camera.position.x)*.035;camera.position.y+=(-my*1.4-camera.position.y)*.035;
    camera.lookAt(scene.position);renderer.render(scene,camera);
  }
  animate();
})();
</script>

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js";

};
const app = initializeApp(cfg);
const auth = getAuth(app);
const loader = document.getElementById('loader');
const screen = document.getElementById('main-screen');
onAuthStateChanged(auth, user => {
  if(user){
    const name = user.displayName || (user.email ? user.email.split('@')[0] : 'there');
    document.getElementById('greet-bubble').innerHTML = `Hi <strong>${name}</strong>! 👋<br>How can I help you today?`;
    loader.style.opacity='0';
    setTimeout(()=>{loader.style.display='none';screen.style.opacity='1';},400);
  } else {
    window.location.href='index.html';
  }
});
</script>

<script>
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.transform='translateX(-50%) translateY(0)';t.style.opacity='1';
  clearTimeout(t._t);
  t._t=setTimeout(()=>{t.style.transform='translateX(-50%) translateY(60px)';t.style.opacity='0';},2000);
}
window.toast=toast;

function useSuggestion(text){
  document.getElementById('msg-input').value = text;
  sendToChat();
}
window.useSuggestion=useSuggestion;

function sendToChat(){
  const val = document.getElementById('msg-input').value.trim();
  // hand off to the full chat screen, carrying the draft along
  if(val){
    sessionStorage.setItem('veltrixa_draft_msg', val);
  }
  window.location.href = 'chatactivity.html';
}
window.sendToChat = sendToChat;

document.getElementById('msg-input').addEventListener('keydown', e=>{
  if(e.key==='Enter'){ e.preventDefault(); sendToChat(); }
});
</script>
