<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Media — Veltrixa</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07071a;--card:#111128;
  --cyan:#00d4ff;--purple:#9b5de5;--pink:#f72585;
  --text:#e2e8f0;--muted:#5a6a82;
  --grad:linear-gradient(135deg,#00d4ff,#9b5de5,#f72585);
  --fD:'Rajdhani',sans-serif;--fB:'Inter',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--fB);overflow:hidden}
#three-bg{position:fixed;inset:0;z-index:0;pointer-events:none}
.shell{position:relative;z-index:1;width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.screen{
  width:100%;max-width:420px;height:100%;max-height:860px;
  background:rgba(9,9,28,0.88);backdrop-filter:blur(20px);
  border:1px solid rgba(155,93,229,0.25);border-radius:36px;
  display:flex;flex-direction:column;overflow:hidden;
  box-shadow:0 0 0 1px rgba(0,212,255,0.08),0 0 60px rgba(155,93,229,0.12),0 0 120px rgba(0,212,255,0.06),inset 0 1px 0 rgba(255,255,255,0.06);
  position:relative;
}
.screen::before{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:40%;height:2px;background:linear-gradient(90deg,transparent,#9b5de5,#00d4ff,#9b5de5,transparent);
  border-radius:0 0 8px 8px;z-index:10;
}
.sheader{
  display:flex;align-items:center;gap:14px;padding:18px 18px 12px;
  background:rgba(9,9,28,0.7);backdrop-filter:blur(16px);flex-shrink:0;
}
.icon-circle{
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);
  transition:border-color .2s,color .2s;flex-shrink:0;
}
.icon-circle:hover{border-color:var(--cyan);color:var(--cyan)}
.sheader h1{font-size:17px;font-weight:600;letter-spacing:.3px;flex:1}

/* TABS */
.tab-row{display:flex;gap:4px;padding:0 18px 14px;border-bottom:1px solid rgba(255,255,255,0.05)}
.tab-btn{
  background:none;border:none;cursor:pointer;
  padding:8px 4px;font-size:13.5px;color:var(--muted);font-family:var(--fB);font-weight:500;
  position:relative;transition:color .2s;
}
.tab-btn.active{color:var(--text)}
.tab-btn.active::after{
  content:'';position:absolute;bottom:-14px;left:0;right:0;height:2px;
  background:var(--grad);border-radius:2px;
}

.content{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px 16px 30px;scrollbar-width:none}
.content::-webkit-scrollbar{display:none}

.month-label{font-size:13px;font-weight:600;color:var(--text);margin:18px 4px 12px}
.month-label:first-child{margin-top:4px}

.media-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.media-thumb{
  aspect-ratio:1;border-radius:12px;cursor:pointer;position:relative;overflow:hidden;
  background-size:cover;background-position:center;
  transition:transform .15s;
}
.media-thumb:hover{transform:scale(1.04)}
.thumb-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,0.5),transparent 40%);
}
.thumb-icon{
  position:absolute;top:6px;left:6px;width:16px;height:16px;color:#fff;opacity:.9;
}
.thumb-duration{
  position:absolute;bottom:6px;right:6px;
  font-size:10px;color:#fff;font-weight:600;
  background:rgba(0,0,0,0.5);padding:2px 5px;border-radius:5px;
}

#loader{
  position:fixed;inset:0;z-index:200;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .4s;
}
.loader-logo{animation:floatY 2s ease-in-out infinite}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.loader-dots{display:flex;gap:6px}
.loader-dots div{width:7px;height:7px;border-radius:50%;animation:dot 1.2s ease-in-out infinite}
.loader-dots div:nth-child(1){background:var(--cyan);animation-delay:0s}
.loader-dots div:nth-child(2){background:var(--purple);animation-delay:.2s}
.loader-dots div:nth-child(3){background:var(--pink);animation-delay:.4s}
@keyframes dot{0%,100%{transform:translateY(0);opacity:.4}50%{transform:translateY(-6px);opacity:1}}
#toast{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(60px);
  background:rgba(11,11,32,0.95);border:1px solid rgba(155,93,229,0.3);
  border-radius:10px;padding:10px 20px;font-size:13px;color:var(--text);
  white-space:nowrap;z-index:999;transition:transform .3s cubic-bezier(.34,1.4,.64,1),opacity .3s;opacity:0;pointer-events:none;
}
@media(max-height:700px){.screen{border-radius:0}}
@media(min-height:860px){.screen{border-radius:36px}}
</style>
</head>
<body>

    <defs><linearGradient id="lg0" x1="0" y1="0" x2="56" y2="56" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#00d4ff"/><stop offset="50%" stop-color="#9b5de5"/><stop offset="100%" stop-color="#f72585"/></linearGradient></defs>
    <polygon points="28,4 52,18 52,38 28,52 4,38 4,18" stroke="url(#lg0)" stroke-width="1.5" fill="none"/>
    <circle cx="28" cy="28" r="5" fill="url(#lg0)"/>
  </svg>
  <div class="loader-dots"><div></div><div></div><div></div></div>
</div>

<div class="shell">
  <div class="screen" id="main-screen" style="opacity:0;transition:opacity .5s">

    <div class="sheader">
      <button class="icon-circle" onclick="history.back()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="15 18 9 12 15 6"/></svg>

      <h1>Media</h1>
      <button class="icon-circle" onclick="toast('Sort options coming soon')">

    <div class="content">

      <div class="month-label">This Month</div>

        <div class="media-thumb" style="background:radial-gradient(circle at 50% 30%,#1e3a5c,#0a1828)" onclick="toast('Opening media…')">

        </div>
        <div class="media-thumb" style="background:radial-gradient(circle at 50% 40%,#3a1a4e,#1a0a28)" onclick="toast('Opening media…')"></div>
        <div class="media-thumb" style="background:radial-gradient(circle at 60% 30%,#1e1b4b,#0f0c29)" onclick="toast('Opening media…')">
          <div class="thumb-overlay"></div>
          <svg class="thumb-icon" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          <span class="thumb-duration">0:08</span>
        </div>
        <div class="media-thumb" style="background:radial-gradient(circle at 50% 60%,#0d2438,#1a3a5c)" onclick="toast('Opening media…')"></div>
        <div class="media-thumb" style="background:linear-gradient(135deg,#312e81,#1e1b4b,#7c3aed)" onclick="toast('Opening media…')">
          <div class="thumb-overlay"></div>

          <div class="thumb-overlay"></div>
          <svg class="thumb-icon" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          <span class="thumb-duration">0:10</span>

        <div class="media-thumb" style="background:linear-gradient(135deg,#4a1a6e,#1a0a28)" onclick="toast('Opening media…')">
          <div class="thumb-overlay"></div>
          <svg class="thumb-icon" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>

        <div class="media-thumb" style="background:linear-gradient(135deg,#0d2438,#1a3a5c)" onclick="toast('Opening media…')">
          <div class="thumb-overlay"></div>
          <svg class="thumb-icon" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>

<!-- THREE.JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
  const canvas=document.getElementById('three-bg');
  const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  const scene=new THREE.Scene();
  const camera=new THREE.PerspectiveCamera(60,1,0.1,1000);
  camera.position.z=28;
  function resize(){const W=window.innerWidth,H=window.innerHeight;renderer.setSize(W,H);camera.aspect=W/H;camera.updateProjectionMatrix();}
  resize();window.addEventListener('resize',resize);
  const sg=new THREE.BufferGeometry();
  const sc=2000,sp=new Float32Array(sc*3),sco=new Float32Array(sc*3);
  const pal=[[0,0.83,1],[0.61,0.36,0.9],[0.97,0.15,0.52],[1,1,1]];
  for(let i=0;i<sc;i++){
    sp[i*3]=(Math.random()-.5)*140;sp[i*3+1]=(Math.random()-.5)*140;sp[i*3+2]=(Math.random()-.5)*100;
    const c=pal[Math.floor(Math.random()*pal.length)];sco[i*3]=c[0];sco[i*3+1]=c[1];sco[i*3+2]=c[2];
  }
  sg.setAttribute('position',new THREE.BufferAttribute(sp,3));
  sg.setAttribute('color',new THREE.BufferAttribute(sco,3));
  scene.add(new THREE.Points(sg,new THREE.PointsMaterial({size:.15,vertexColors:true,transparent:true,opacity:.9})));
  function ring(r,c,op,rx,ry){const m=new THREE.Mesh(new THREE.TorusGeometry(r,.05,8,120),new THREE.MeshBasicMaterial({color:c,transparent:true,opacity:op}));m.rotation.x=rx;m.rotation.y=ry;scene.add(m);return m;}
  const r1=ring(16,0x00d4ff,.1,Math.PI/4,0);
  const r2=ring(12,0x9b5de5,.08,-Math.PI/3,Math.PI/5);
  const r3=ring(20,0xf72585,.05,Math.PI/6,Math.PI/3);
  const nodes=[];const nc=[0x00d4ff,0x9b5de5,0xf72585];
  for(let i=0;i<28;i++){
    const m=new THREE.Mesh(new THREE.SphereGeometry(Math.random()*.1+.04,8,8),new THREE.MeshBasicMaterial({color:nc[i%3],transparent:true,opacity:Math.random()*.5+.2}));
    const r=Math.random()*18+4,t=Math.random()*Math.PI*2,p=Math.random()*Math.PI;
    m.position.set(r*Math.sin(p)*Math.cos(t),r*Math.sin(p)*Math.sin(t),r*Math.cos(p));
    m.userData={ox:m.position.x,oy:m.position.y,oz:m.position.z,sp:Math.random()*.5+.2,amp:Math.random()*1.8+.5,ph:Math.random()*Math.PI*2};
    scene.add(m);nodes.push(m);
  }
  function neb(x,y,z,c,op,s){const m=new THREE.Mesh(new THREE.PlaneGeometry(s,s),new THREE.MeshBasicMaterial({color:c,transparent:true,opacity:op,side:THREE.DoubleSide,depthWrite:false}));m.position.set(x,y,z);m.rotation.z=Math.random()*Math.PI;scene.add(m);}
  neb(-12,5,-18,0x00d4ff,0.03,20);neb(12,-5,-22,0x9b5de5,0.04,24);neb(0,0,-25,0xf72585,0.02,30);
  let mx=0,my=0;
  window.addEventListener('mousemove',e=>{mx=(e.clientX/window.innerWidth-.5)*2;my=(e.clientY/window.innerHeight-.5)*2;});
  window.addEventListener('touchmove',e=>{mx=(e.touches[0].clientX/window.innerWidth-.5)*2;my=(e.touches[0].clientY/window.innerHeight-.5)*2;},{passive:true});
  let t=0;
  function animate(){
    requestAnimationFrame(animate);t+=0.007;
    r1.rotation.z+=.002;r2.rotation.z-=.0015;r3.rotation.y+=.001;
    nodes.forEach(n=>{const d=n.userData;n.position.x=d.ox+Math.sin(t*d.sp+d.ph)*d.amp;n.position.y=d.oy+Math.cos(t*d.sp*.7+d.ph)*d.amp;n.material.opacity=.15+Math.abs(Math.sin(t*d.sp+d.ph))*.45;});
    camera.position.x+=(mx*1.8-camera.position.x)*.035;camera.position.y+=(-my*1.4-camera.position.y)*.035;
    camera.lookAt(scene.position);renderer.render(scene,camera);
  }
  animate();
})();
</script>

<script>
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.transform='translateX(-50%) translateY(0)';t.style.opacity='1';
  clearTimeout(t._t);
  t._t=setTimeout(()=>{t.style.transform='translateX(-50%) translateY(60px)';t.style.opacity='0';},2000);
}
window.toast=toast;

function switchTab(btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  toast(`Showing ${btn.textContent}`);
}
window.switchTab=switchTab;
</script>
