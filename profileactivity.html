<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Profile — Veltrixa</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07071a;--card:#111128;
  --cyan:#00d4ff;--purple:#9b5de5;--pink:#f72585;--green:#4ade80;
  --text:#e2e8f0;--muted:#5a6a82;
  --grad:linear-gradient(135deg,#00d4ff,#9b5de5,#f72585);
  --fD:'Rajdhani',sans-serif;--fB:'Inter',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--fB);overflow:hidden}
#three-bg{position:fixed;inset:0;z-index:0;pointer-events:none}
.shell{position:relative;z-index:1;width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.screen{
  width:100%;max-width:420px;height:100%;max-height:860px;
  background:rgba(9,9,28,0.88);backdrop-filter:blur(20px);
  border:1px solid rgba(155,93,229,0.25);border-radius:36px;
  display:flex;flex-direction:column;overflow:hidden;
  box-shadow:0 0 0 1px rgba(0,212,255,0.08),0 0 60px rgba(155,93,229,0.12),0 0 120px rgba(0,212,255,0.06),inset 0 1px 0 rgba(255,255,255,0.06);
  position:relative;
}
.screen::before{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:40%;height:2px;
  background:linear-gradient(90deg,transparent,#9b5de5,#00d4ff,#9b5de5,transparent);
  border-radius:0 0 8px 8px;z-index:10;
}

/* HEADER */
.pheader{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 18px 14px;
  background:rgba(9,9,28,0.7);backdrop-filter:blur(16px);
  flex-shrink:0;
}
.icon-circle{
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--text);transition:border-color .2s,color .2s;
}
.icon-circle:hover{border-color:var(--cyan);color:var(--cyan)}
.pheader h1{font-size:17px;font-weight:600;letter-spacing:.3px}

/* CONTENT */
.content{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 0 90px;scrollbar-width:none}
.content::-webkit-scrollbar{display:none}

/* AVATAR BLOCK */
.avatar-block{display:flex;flex-direction:column;align-items:center;padding:14px 20px 18px}
.avatar-ring-wrap{position:relative;width:108px;height:108px;margin-bottom:14px}
.avatar-ring-wrap .ring{
  position:absolute;inset:0;border-radius:50%;
  border:2px solid transparent;
  background:linear-gradient(var(--bg),var(--bg)) padding-box,var(--grad) border-box;
  animation:spinRing 6s linear infinite;
}
@keyframes spinRing{to{transform:rotate(360deg)}}
.avatar-circle{
  position:absolute;inset:8px;border-radius:50%;
  background:linear-gradient(135deg,#1a1a3e,#2a1a4e);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;box-shadow:0 0 24px rgba(0,212,255,0.25);
}
.avatar-circle svg{width:54px;height:54px;color:var(--purple)}
.avatar-badge{
  position:absolute;bottom:4px;right:4px;
  width:30px;height:30px;border-radius:9px;
  background:linear-gradient(135deg,var(--cyan),var(--purple));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 12px rgba(0,212,255,0.5);
  border:2px solid var(--bg);
}
.avatar-badge svg{width:15px;height:15px;color:#fff}
.profile-name{font-size:21px;font-weight:700;letter-spacing:.2px}
.profile-handle{font-size:13.5px;color:var(--cyan);margin-top:3px}
.profile-bio{font-size:12.5px;color:var(--muted);margin-top:8px;text-align:center;max-width:280px;line-height:1.4}

/* STATS */
.stats-row{
  display:flex;align-items:center;justify-content:space-around;
  padding:18px 24px;margin:0 16px 20px;
  background:var(--card);border:1px solid rgba(255,255,255,0.05);
  border-radius:18px;
}
.stat-item{text-align:center}
.stat-num{font-size:19px;font-weight:700;font-family:var(--fD)}
.stat-label{font-size:11.5px;color:var(--muted);margin-top:2px}
.stat-divider{width:1px;height:32px;background:rgba(255,255,255,0.07)}

/* PLAN CARD */
.profile-plan{
  margin:0 16px 20px;
  background:linear-gradient(135deg,rgba(0,212,255,0.1),rgba(155,93,229,0.12));
  border:1px solid rgba(0,212,255,0.3);border-radius:18px;
  padding:16px 18px;display:flex;align-items:center;gap:14px;
  cursor:pointer;transition:transform .2s,box-shadow .2s;
}
.profile-plan:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,212,255,0.15)}
.plan-icon{
  width:44px;height:44px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.plan-icon svg{width:36px;height:36px;filter:drop-shadow(0 0 8px rgba(0,212,255,.5))}
.profile-plan .pinfo{flex:1}
.profile-plan .pinfo h3{font-size:15px;font-weight:600}
.profile-plan .pinfo p{font-size:12px;color:var(--muted);margin-top:2px}
.chevron{color:var(--muted);flex-shrink:0}

/* MENU LIST */
.menu-list{padding:0 16px;display:flex;flex-direction:column;gap:8px}
.menu-item{
  display:flex;align-items:center;gap:14px;
  padding:15px 16px;
  background:var(--card);border:1px solid rgba(255,255,255,0.05);
  border-radius:14px;cursor:pointer;
  transition:border-color .2s,transform .15s;
}
.menu-item:hover{border-color:rgba(155,93,229,0.3);transform:translateX(2px)}
.mi-icon{width:20px;height:20px;flex-shrink:0;color:var(--purple)}
.mi-icon.c2{color:var(--cyan)}
.mi-icon.c3{color:var(--pink)}
.mi-text{flex:1;font-size:14.5px;font-weight:500}
.mi-value{font-size:13px;color:var(--muted)}

/* BOTTOM NAV */
.bottom-nav{
  position:absolute;bottom:0;left:0;right:0;height:80px;
  background:rgba(9,9,28,0.9);backdrop-filter:blur(20px);
  border-top:1px solid rgba(155,93,229,0.15);
  display:flex;align-items:center;justify-content:space-around;
  padding:0 8px 12px;z-index:20;
}
.nav-item{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  background:none;border:none;cursor:pointer;color:var(--muted);
  padding:8px 12px;transition:color .2s;flex:1;
}
.nav-item.active{color:var(--cyan)}
.nav-item svg{width:20px;height:20px}
.nav-item span{font-size:10px;font-weight:500}
.nav-fab{
  width:52px;height:52px;border-radius:14px;background:var(--grad);
  border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(155,93,229,0.5),0 0 0 4px rgba(155,93,229,0.1);
  transition:transform .2s;flex-shrink:0;
}
.nav-fab:hover{transform:scale(1.08)}
.nav-fab svg{width:22px;height:22px;color:#fff}

/* LOADER */
#loader{
  position:fixed;inset:0;z-index:200;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
  transition:opacity .4s;
}
.loader-logo{animation:floatY 2s ease-in-out infinite}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.loader-dots{display:flex;gap:6px}
.loader-dots div{width:7px;height:7px;border-radius:50%;animation:dot 1.2s ease-in-out infinite}
.loader-dots div:nth-child(1){background:var(--cyan);animation-delay:0s}
.loader-dots div:nth-child(2){background:var(--purple);animation-delay:.2s}
.loader-dots div:nth-child(3){background:var(--pink);animation-delay:.4s}
@keyframes dot{0%,100%{transform:translateY(0);opacity:.4}50%{transform:translateY(-6px);opacity:1}}

#toast{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(60px);
  background:rgba(11,11,32,0.95);border:1px solid rgba(155,93,229,0.3);
  border-radius:10px;padding:10px 20px;font-size:13px;color:var(--text);
  white-space:nowrap;z-index:999;
  transition:transform .3s cubic-bezier(.34,1.4,.64,1),opacity .3s;opacity:0;pointer-events:none;
}

@media(max-height:700px){.screen{border-radius:0}}
@media(min-height:860px){.screen{border-radius:36px}}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
  const canvas=document.getElementById('three-bg');
  const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  const scene=new THREE.Scene();
  const camera=new THREE.PerspectiveCamera(60,1,0.1,1000);
  camera.position.z=28;
  function resize(){const W=window.innerWidth,H=window.innerHeight;renderer.setSize(W,H);camera.aspect=W/H;camera.updateProjectionMatrix();}
  resize();window.addEventListener('resize',resize);

  const sg=new THREE.BufferGeometry();
  const sc=2000,sp=new Float32Array(sc*3),sco=new Float32Array(sc*3);
  const pal=[[0,0.83,1],[0.61,0.36,0.9],[0.97,0.15,0.52],[1,1,1]];
  for(let i=0;i<sc;i++){
    sp[i*3]=(Math.random()-.5)*140;sp[i*3+1]=(Math.random()-.5)*140;sp[i*3+2]=(Math.random()-.5)*100;
    const c=pal[Math.floor(Math.random()*pal.length)];sco[i*3]=c[0];sco[i*3+1]=c[1];sco[i*3+2]=c[2];
  }
  sg.setAttribute('position',new THREE.BufferAttribute(sp,3));
  sg.setAttribute('color',new THREE.BufferAttribute(sco,3));
  scene.add(new THREE.Points(sg,new THREE.PointsMaterial({size:.15,vertexColors:true,transparent:true,opacity:.9})));

  function ring(r,c,op,rx,ry){
    const m=new THREE.Mesh(new THREE.TorusGeometry(r,.05,8,120),new THREE.MeshBasicMaterial({color:c,transparent:true,opacity:op}));
    m.rotation.x=rx;m.rotation.y=ry;scene.add(m);return m;
  }
  const r1=ring(16,0x00d4ff,.1,Math.PI/4,0);
  const r2=ring(12,0x9b5de5,.08,-Math.PI/3,Math.PI/5);
  const r3=ring(20,0xf72585,.05,Math.PI/6,Math.PI/3);

  const nodes=[];const nc=[0x00d4ff,0x9b5de5,0xf72585];
  for(let i=0;i<28;i++){
    const m=new THREE.Mesh(new THREE.SphereGeometry(Math.random()*.1+.04,8,8),new THREE.MeshBasicMaterial({color:nc[i%3],transparent:true,opacity:Math.random()*.5+.2}));
    const r=Math.random()*18+4,t=Math.random()*Math.PI*2,p=Math.random()*Math.PI;
    m.position.set(r*Math.sin(p)*Math.cos(t),r*Math.sin(p)*Math.sin(t),r*Math.cos(p));
    m.userData={ox:m.position.x,oy:m.position.y,oz:m.position.z,sp:Math.random()*.5+.2,amp:Math.random()*1.8+.5,ph:Math.random()*Math.PI*2};
    scene.add(m);nodes.push(m);
  }

  function neb(x,y,z,c,op,s){
    const m=new THREE.Mesh(new THREE.PlaneGeometry(s,s),new THREE.MeshBasicMaterial({color:c,transparent:true,opacity:op,side:THREE.DoubleSide,depthWrite:false}));
    m.position.set(x,y,z);m.rotation.z=Math.random()*Math.PI;scene.add(m);
  }
  neb(-12,5,-18,0x00d4ff,0.03,20);neb(12,-5,-22,0x9b5de5,0.04,24);neb(0,0,-25,0xf72585,0.02,30);

  let mx=0,my=0;
  window.addEventListener('mousemove',e=>{mx=(e.clientX/window.innerWidth-.5)*2;my=(e.clientY/window.innerHeight-.5)*2;});
  window.addEventListener('touchmove',e=>{mx=(e.touches[0].clientX/window.innerWidth-.5)*2;my=(e.touches[0].clientY/window.innerHeight-.5)*2;},{passive:true});

  let t=0;
  function animate(){
    requestAnimationFrame(animate);t+=0.007;
    r1.rotation.z+=.002;r2.rotation.z-=.0015;r3.rotation.y+=.001;
    nodes.forEach(n=>{
      const d=n.userData;
      n.position.x=d.ox+Math.sin(t*d.sp+d.ph)*d.amp;
      n.position.y=d.oy+Math.cos(t*d.sp*.7+d.ph)*d.amp;
      n.material.opacity=.15+Math.abs(Math.sin(t*d.sp+d.ph))*.45;
    });
    camera.position.x+=(mx*1.8-camera.position.x)*.035;
    camera.position.y+=(-my*1.4-camera.position.y)*.035;
    camera.lookAt(scene.position);
    renderer.render(scene,camera);
  }
  animate();
})();
</script>

    const handle = user.email ? '@' + user.email.split('@')[0] : '@user';
    document.getElementById('p-name').textContent = name;
    document.getElementById('p-handle').textContent = handle;
    loader.style.opacity='0';
    setTimeout(()=>{loader.style.display='none';screen.style.opacity='1';},400);
  } else {
    window.location.href='index.html';
  }
});
</script>

<script>
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.transform='translateX(-50%) translateY(0)';t.style.opacity='1';
  clearTimeout(t._t);
  t._t=setTimeout(()=>{t.style.transform='translateX(-50%) translateY(60px)';t.style.opacity='0';},2200);
}
window.toast=toast;
</script>
</body>
</html>
